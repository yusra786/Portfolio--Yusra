<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yusra Waseem | Portfolio</title>
    <meta name="description" content="Portfolio of Yusra Waseem - B.Tech CSE, Data Analytics Enthusiast, and AI Explorer.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://resource.trickle.so/vendor_lib/unpkg/lucide-static@0.516.0/font/lucide.css" rel="stylesheet">

    <style type="text/tailwindcss">
    @layer theme {
        :root {
            --bg-color: #070514;
            --primary: #00f0ff;
            --secondary: #b026ff;
            --text-main: #f8f9fa;
            --text-muted: #a0aec0;
        }
    }

    @layer base {
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--secondary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    }

    @layer utilities {
        .glass-panel {
            @apply bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl;
        }
        
        .glow-text {
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }
        
        .glow-button {
            @apply relative overflow-hidden transition-all duration-300 shadow-[0_0_15px_rgba(176,38,255,0.4)] hover:shadow-[0_0_25px_rgba(0,240,255,0.6)];
        }
        
        .bg-gradient-radial {
            background: radial-gradient(circle at center, var(--tw-gradient-stops));
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
        }
    }

    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    
    /* Animated mesh background */
    .bg-mesh {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        z-index: -1;
        background: 
            radial-gradient(circle at 15% 50%, rgba(176, 38, 255, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 85% 30%, rgba(0, 240, 255, 0.15) 0%, transparent 50%);
        filter: blur(60px);
    }
    </style>
</head>
<body class="antialiased selection:bg-[var(--primary)] selection:text-black">
    <div class="bg-mesh"></div>
    <div id="root"></div>

    <script type="text/babel" src="components/Navbar.js"></script>
    <script type="text/babel" src="components/Hero.js"></script>
    <script type="text/babel" src="components/Skills.js"></script>
    <script type="text/babel" src="components/Projects.js"></script>
    <script type="text/babel" src="components/Timeline.js"></script>
    <script type="text/babel" src="components/Contact.js"></script>
    <script type="text/babel" src="app.js"></script>
</body>
</html>
